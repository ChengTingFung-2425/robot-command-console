name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v3.2.0)'
        required: true
        type: string

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  create-release:
    name: 建立 Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 取得版本號
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 取得版本資訊
        id: version_info
        run: |
          python src/common/version.py > version_info.json
          cat version_info.json
      
      - name: 生成 Release Notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Robot Command Console ${{ steps.get_version.outputs.version }}
          
          ### 🎉 新功能
          
          - ✅ Tiny Edge App - PyQt6 輕量級桌面應用
          - ✅ 完整的固件更新管理（非同步處理）
          - ✅ 專業的啟動畫面與 UI 優化
          - ✅ 完整的工具列功能（全螢幕、幫助、關於）
          - ✅ 統一的後端服務管理
          
          ### 📦 下載
          
          請從下方選擇適合您作業系統的版本：
          - **Linux**: RobotConsole-linux.AppImage / RobotConsole-linux.tar.gz
          - **Windows**: RobotConsole-Setup-*.exe / RobotConsole-Electron-Setup-*.exe
          - **macOS**: RobotConsole-macos.tar.gz
          
          ### 📋 系統需求
          
          - **作業系統**: Windows 10+, macOS 12+, Ubuntu 22.04+
          - **記憶體**: 最小 4GB RAM
          - **儲存空間**: 最小 200MB
          
          ### 🚀 快速開始
          
          1. 下載對應平台的安裝檔或壓縮檔
          2. Windows 執行安裝程式；Linux/macOS 依需求解壓縮或直接執行
          3. 啟動 `RobotConsole` 主程式
          
          詳細安裝說明請參閱 [README.md](https://github.com/ChengTingFung-2425/robot-command-console/blob/main/README.md)
          
          ### 🔧 技術堆疊
          
          - **前端**: PyQt6 + QtWebEngine
          - **後端**: Flask + Robot Service
          - **通訊**: QWebChannel Bridge
          - **打包**: PyInstaller / electron-builder / NSIS
          
          ### 📝 完整變更記錄
          
          請參閱 [CHANGELOG.md](https://github.com/ChengTingFung-2425/robot-command-console/blob/main/CHANGELOG.md)
          
          ### 🐛 已知問題
          
          - macOS 版本需要在安全性設定中允許執行（首次啟動）
          - Windows Defender 可能會標記為未知應用程式（正常現象）
          
          ### 💬 回饋與支援
          
          如遇到問題，請到 [Issues](https://github.com/ChengTingFung-2425/robot-command-console/issues) 回報。
          EOF
          
          cat release_notes.md
      
      - name: 建立 GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'alpha') }}
  
  build-and-upload:
    name: 構建並上傳 - ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: RobotConsole-linux
            asset_name: RobotConsole-linux.tar.gz
            asset_content_type: application/gzip
          - os: windows-latest
            platform: windows
            artifact_name: RobotConsole-windows
            asset_name: RobotConsole-windows.zip
            asset_content_type: application/zip
          - os: macos-latest
            platform: macos
            artifact_name: RobotConsole-macos
            asset_name: RobotConsole-macos.tar.gz
            asset_content_type: application/gzip
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4
      
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 設定 Node.js
        # macOS 僅使用 scripts/build-macos.sh 的 PyInstaller 流程，不需 electron-builder。
        if: matrix.platform != 'macos'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Edge/electron-app/package-lock.json
      
      - name: 安裝系統依賴 (Ubuntu)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0 \
            libgl1 libdbus-1-3 libegl1

      - name: 安裝系統依賴 (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install mysql-client
      
      - name: 安裝 Python 依賴
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r Edge/requirements.txt
          pip install pyinstaller pillow

      - name: 執行跨平台打包腳本
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            linux)
              bash scripts/build-linux.sh
              ;;
            windows)
              pwsh -NoLogo -NoProfile -File scripts/build-windows.ps1
              ;;
            macos)
              bash scripts/build-macos.sh
              ;;
          esac

      - name: 上傳 Linux Release Assets
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            ./dist/RobotConsole-linux.AppImage
            ./dist/RobotConsole-linux.tar.gz

      - name: 上傳 Windows Release Assets
        if: matrix.platform == 'windows'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            ./dist/RobotConsole-Setup-*.exe
            ./dist/RobotConsole-Electron-Setup-*.exe

      - name: 上傳 macOS Release Assets
        if: matrix.platform == 'macos'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: ./dist/RobotConsole-macos.tar.gz
